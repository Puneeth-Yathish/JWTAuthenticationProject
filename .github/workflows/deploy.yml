name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ Build JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ✅ Copy JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/app/"

      # ✅ Run application on EC2
      - name: Run app on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: cd /home/ec2-user/app/target && nohup java -jar securezone-0.0.1-SNAPSHOT.jar &








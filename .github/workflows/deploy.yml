name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Java Setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ Build
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ✅ Copy JAR
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/app/"

      # ✅ Deploy
      - name: Run app on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Stopping old app..."
            pkill -f securezone || true

            echo "Waiting..."
            sleep 5

            echo "Starting new app..."
            cd /home/ec2-user/app/target

            nohup java -jar securezone-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

            echo "Waiting for startup..."
            sleep 10

            echo "Checking process..."
            ps -ef | grep securezone | grep -v grep

            echo "Checking port..."
            ss -tulnp | grep 8080 || echo "Port not open!"

            echo "Logs:"
            tail -n 20 app.log

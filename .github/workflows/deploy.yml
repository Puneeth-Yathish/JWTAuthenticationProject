name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ Build JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ✅ Copy JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/app/"

      # ✅ Run application on EC2
      - name: Run app on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Checking running app..."
            pid=$(pgrep -f securezone-0.0.1-SNAPSHOT.jar)

            if [ ! -z "$pid" ]; then
              echo "Stopping app gracefully ($pid)"
              kill $pid
              sleep 10
            else
              echo "No running app found"
            fi

            echo "Starting new app..."
            cd /home/ec2-user/app/target
            nohup java -jar securezone-0.0.1-SNAPSHOT.jar &

            echo "Waiting..."
            sleep 10

            echo "Verifying..."
            ps -ef | grep securezone | grep -v grep
            ss -tulnp | grep 8080 || echo "Port not open!"
          
         
          

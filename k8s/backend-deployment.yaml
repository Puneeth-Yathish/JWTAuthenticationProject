apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 410937487579.dkr.ecr.ap-south-1.amazonaws.com/securezone-backend:latest
          ports:
            - containerPort: 8080